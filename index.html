<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Racer 2026</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #333; margin: 0 auto; touch-action: none; }
        
        /* Controles Mobile */
        .controls {
            position: fixed;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
        }
        .btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid #fff;
            border-radius: 50%;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            user-select: none;
        }
        .btn:active { background: rgba(255, 255, 255, 0.5); }
        #score {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="score">Pontos: 0</div>
<canvas id="gameCanvas"></canvas>

<div class="controls">
    <div class="btn" id="leftBtn">ESQ</div>
    <div class="btn" id="rightBtn">DIR</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    // Ajustar tamanho do canvas
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let gameSpeed = 5;
    let isGameOver = false;

    // Jogador
    const player = {
        x: canvas.width / 2 - 25,
        y: canvas.height - 120,
        w: 50,
        h: 80,
        color: '#ff0000'
    };

    // Obstáculos (Outros carros)
    const enemies = [];
    function createEnemy() {
        const x = Math.random() * (canvas.width - 60) + 10;
        enemies.push({ x: x, y: -100, w: 50, h: 80, color: '#00ff00' });
    }

    // Input do Jogador
    let moveLeft = false;
    let moveRight = false;

    document.getElementById('leftBtn').ontouchstart = () => moveLeft = true;
    document.getElementById('leftBtn').ontouchend = () => moveLeft = false;
    document.getElementById('rightBtn').ontouchstart = () => moveRight = true;
    document.getElementById('rightBtn').ontouchend = () => moveRight = false;

    // Teclado para PC
    window.addEventListener('keydown', e => {
        if(e.key === 'ArrowLeft') moveLeft = true;
        if(e.key === 'ArrowRight') moveRight = true;
    });
    window.addEventListener('keyup', e => {
        if(e.key === 'ArrowLeft') moveLeft = false;
        if(e.key === 'ArrowRight') moveRight = false;
    });

    function update() {
        if (isGameOver) return;

        // Movimento do jogador
        if (moveLeft && player.x > 0) player.x -= 7;
        if (moveRight && player.x < canvas.width - player.w) player.x += 7;

        // Movimento dos inimigos
        for (let i = 0; i < enemies.length; i++) {
            enemies[i].y += gameSpeed;

            // Colisão
            if (player.x < enemies[i].x + enemies[i].w &&
                player.x + player.w > enemies[i].x &&
                player.y < enemies[i].y + enemies[i].h &&
                player.y + player.h > enemies[i].y) {
                isGameOver = true;
                alert("Game Over! Pontuação: " + score);
                location.reload();
            }

            // Remover inimigos que saíram da tela
            if (enemies[i].y > canvas.height) {
                enemies.splice(i, 1);
                score++;
                scoreElement.innerText = "Pontos: " + score;
                if(score % 5 === 0) gameSpeed += 0.5; // Aumenta dificuldade
            }
        }

        if (Math.random() < 0.02) createEnemy();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Estrada (Linhas laterais)
        ctx.fillStyle = '#555';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 5;
        ctx.setLineDash([20, 20]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();

        // Desenhar Jogador (Carro)
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.w, player.h);
        // Detalhes do carro (Rodas)
        ctx.fillStyle = 'black';
        ctx.fillRect(player.x - 5, player.y + 10, 5, 20);
        ctx.fillRect(player.x + player.w, player.y + 10, 5, 20);

        // Desenhar Inimigos
        enemies.forEach(en => {
            ctx.fillStyle = en.color;
            ctx.fillRect(en.x, en.y, en.w, en.h);
        });

        requestAnimationFrame(() => {
            update();
            draw();
        });
    }

    draw();
</script>

</body>
</html>
